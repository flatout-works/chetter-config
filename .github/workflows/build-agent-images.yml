name: Build agent images
on:
  push:
    branches: [main]
    paths: ["global/images/**"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  ORG: flatout-works
  BASE_IMAGE: ghcr.io/flatout-works/chetter-agent-base:main

jobs:
  pull-base:
    runs-on: ubuntu-latest
    steps:
      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull agent-base image
        run: |
          docker pull "${{ env.BASE_IMAGE }}" || {
            echo "::error::chetter-agent-base:main not found on GHCR."
            echo "::error::The chetter CI must build and push it first."
            echo "::error::Run the Chetter workflow on flatout-works/chetter before retrying."
            exit 1
          }

  build:
    needs: [pull-base]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant:
          - golang
          - python
          - node
          - rust
          - minimal
          - java-spring
    steps:
      - uses: actions/checkout@v4

      - name: Log into GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.variant }}
        run: |
          SHA_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/chetter-agent:${{ matrix.variant }}-${{ github.sha }}"
          MAIN_TAG="${{ env.REGISTRY }}/${{ env.ORG }}/chetter-agent:${{ matrix.variant }}"
          docker build \
            --build-arg BASE_IMAGE="${{ env.BASE_IMAGE }}" \
            -f "global/images/${{ matrix.variant }}/Dockerfile" \
            -t "$SHA_TAG" \
            -t "$MAIN_TAG" .
          docker push "$SHA_TAG"
          docker push "$MAIN_TAG"
