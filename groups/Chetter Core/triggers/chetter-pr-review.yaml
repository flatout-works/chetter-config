# yaml-language-server: $schema=../../../../chetter/schemas/trigger.schema.json
# Trigger: PR review for Chetter
#
# Reviews newly opened pull requests in flatout-works/chetter. The event is
# intentionally `opened` rather than empty: the webhook adds the
# `chetter-review` label when a review starts, and matching every PR event would
# also react to that label event and risk duplicate review tasks.

name: chetter-pr-review
enabled: true
trigger_type: pr_review
repo: flatout-works/chetter
event: opened
git_url: https://github.com/flatout-works/chetter.git
git_ref: main
agent_image: chetter-agent:golang
harness: opencode
agent: pr-reviewer
provider_id: opencode
model_id: deepseek-v4-flash-free
timeout_sec: 3600
skills:
  - issue-implementer
prompt: |-
  You are doing a PR review for an opened PR.
