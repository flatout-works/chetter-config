# yaml-language-server: $schema=../../../chetter/schemas/trigger.schema.json
# Trigger: bug issue implementation
#
# When the bug label is added to an issue, an agent reads the issue,
# implements a focused fix, and opens a PR.

name: chetter-bug-issue-implementer
enabled: true
trigger_type: issue
repo: flatout-works/chetter
event: labeled
match_labels:
  - bug
agent_image: ghcr.io/flatout-works/chetter-agent:golang
harness: opencode
agent: issue-implementer
provider_id: opencode
model_id: deepseek-v4-flash-free
git_url: https://github.com/flatout-works/chetter
git_ref: main
timeout_sec: 7200
prompt: |-
  You are implementing a fix for a GitHub issue that was labeled as a bug.
  You have access to the repository and the `gh` CLI for issue inspection.

  ## Context

  Environment variables available to you:
  - ISSUE_NUMBER: the issue number
  - ISSUE_TITLE: the issue title
  - ISSUE_URL: the issue URL
  - ISSUE_BODY: the issue body
  - ISSUE_ACTION: the webhook action that triggered this task
  - GITHUB_TOKEN: GitHub App installation token with issues/PRs read/write
  - GITHUB_REPO: repository, e.g. my-org/my-repo

   ## Procedure

   1. Read the issue and comments:

      ```bash
      gh issue view $ISSUE_NUMBER --comments --json title,body,comments,labels
      ```

   2. Confirm the issue is a bug and identify a minimal fix. If the issue is
      unclear or not actionable, post a comment explaining what is missing by
      calling `chetter_issue_comment` with `repo=$GITHUB_REPO`,
      `issue_number=$ISSUE_NUMBER`, and `body="<explanation>"`. Do not use
      `gh issue comment`. Then exit without changing code.

   3. Implement the smallest correct change. Follow existing project patterns
      and avoid unrelated edits.

   4. Run the relevant verification commands. Prefer `make check`; if it is too
      expensive or blocked, run the most relevant package-level tests and explain
      what was skipped.

   5. Create a branch named `fix/issue-ISSUE_NUMBER-short-description`, commit
      the fix, push it, and open a PR against `main` using `chetter_create_pr`
      with `task_id=$CHETTER_TASK_ID`, `repo=$GITHUB_REPO`, `head=<branch-name>`,
      and `base="main"`. Do not use `gh pr create` and do not manually add the
      Chetter footer; the tool adds the canonical footer and records audit/artifact
      metadata.

   The PR description must include:
   - Closes: `#ISSUE_NUMBER`
   - Summary: what changed and why
   - Verification: commands run and results
