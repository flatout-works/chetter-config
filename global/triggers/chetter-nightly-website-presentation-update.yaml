# yaml-language-server: $schema=../../../chetter/schemas/trigger.schema.json
name: chetter-nightly-website-presentation-update
enabled: true
cron_expr: "0 5 * * *"
git_url: https://github.com/flatout-works/chetter
git_ref: main
agent_image: chetter-agent:golang
harness: opencode
agent: docs-maintainer
provider_id: deepseek
model_id: deepseek-v4-pro
timeout_sec: 7200
prompt: |-
  Review all changes made to the repository in the last 24 hours and update the website and technical architecture presentation so they accurately reflect the current state of the product.

  ## Step 1: Understand what changed
  Run:
  ```bash
  git log --since="24 hours ago" --pretty=format:"%h %s" --all
  ```

  ## Step 2: Read current materials
  Read these files to understand the current messaging:
  - `website/index.html` — The public marketing website
  - `website/styles.css` — Website styles (shared by all pages)
  - `website/technical.html` — Technical architecture sub-page (was previously the standalone presentation3 deck)

  Also read source-of-truth docs: `README.md`, `AGENTS.md`, `CHANGELOG.md`.

  ## Step 3: Update the website
  Update `website/index.html` to accurately describe current product capabilities, tech stack, architecture, and any new features. Keep the same visual design language and existing branding.

  ## Step 4: Update the technical architecture sub-page
  Update `website/technical.html` to accurately reflect the current system architecture and technologies in use. Keep the existing slide structure and visual style, and keep it consistent with the main website's design language.

   ## Step 5: Commit and create PR
   Commit all changes to a new branch named `docs/nightly-website-update-{YYYY-MM-DD}`, push, and create a GitHub PR against `main` with a summary of what was updated and why.
   Keep changes focused on documentation/marketing accuracy only. If no significant changes occurred, still review materials for accuracy and create a PR noting "no material changes — verified accuracy".
