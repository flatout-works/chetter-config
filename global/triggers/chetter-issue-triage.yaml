# yaml-language-server: $schema=../../../chetter/schemas/trigger.schema.json
# Trigger: issue triage with Kimi K2.6
#
# When a new issue is created, an agent assesses the issue, produces a
# plan, and posts a triage comment with findings, feedback, and next steps.
#
# Customize before enabling:
#   git_url      - your repository URL or leave empty (issue tasks don't clone)
#   agent_image  - runner image (get from your Chetter admin or build your own)
#   provider_id  - LLM provider (synthetic for Kimi, or your configured provider)
#   model_id     - model identifier (e.g. hf:moonshotai/Kimi-K2.6)
#   timeout_sec  - adjust for issue complexity (3600 = 1 hour recommended)
#   skills       - skill hints for the runner (optional)
#
# To create: chetter_create_trigger with these fields.
# To change: chetter_update_trigger with changed fields.

name: chetter-issue-triage
enabled: true
trigger_type: issue
repo: flatout-works/chetter
event: opened
agent_image: chetter-agent:golang
harness: opencode
agent: issue-triage
provider_id: opencode
model_id: deepseek-v4-flash-free
timeout_sec: 3600
skills:
  - issue-triage
prompt: |-
  You are performing an initial issue triage. You have access to the
  repository and the `gh` CLI for read-only inspection.

  ## Context

  Environment variables available to you:
  - ISSUE_NUMBER — the issue number
  - ISSUE_TITLE — the issue title
  - ISSUE_URL — the issue URL
  - ISSUE_ACTION — the event that triggered this task (e.g. "opened")
  - GITHUB_TOKEN — GitHub App installation token with issues read/write
  - GITHUB_REPO — repository (e.g., my-org/my-repo)

  ## Procedure

  ### 1. Understand the issue

  Read the issue description and any linked resources:

  ```bash
  gh issue view $ISSUE_NUMBER --json title,body,labels,assignees,comments
  ```

  ### 2. Assess and classify

  - **Category**: bug, feature request, question, documentation, discussion
  - **Priority**: critical, high, medium, low
  - **Scope**: does this affect a single component or the whole system?
  - **Reproducibility**: are there steps to reproduce? (for bugs)

  ### 3. Produce a plan

  Outline the steps needed to resolve the issue. Be specific about files,
  components, or areas that need changes. If the issue is unclear, list
  clarifying questions.

  ### 4. Post triage comment

   Post a structured comment on the issue by calling the `chetter_issue_comment`
   MCP tool with `repo=$GITHUB_REPO` and `issue_number=$ISSUE_NUMBER`. Do not
   use `gh issue comment` and do not manually add the Chetter footer; the tool
   adds the canonical footer and records audit/artifact metadata.

   The comment must include:
  - **Assessment**: brief summary of what the issue is about
  - **Category**: the classification from step 2
  - **Priority**: the priority level and reasoning
  - **Plan**: concrete next steps, or clarifying questions if more info is needed
  - **Labels**: if applicable, suggest labels that should be added
   Do not close the issue or assign it unless the instructions above tell you
   to. If the issue is a duplicate, note the duplicate reference and suggest
   closing.

   ### 5. Approve for implementation

   If the issue is clear and actionable (not a question, not a duplicate,
   and contains enough detail to implement), add the `approved` label so
   the implementer trigger picks it up:

   ```bash
   gh issue edit $ISSUE_NUMBER --add-label "approved"
   ```

   Only add the label if you are confident the issue is ready to be worked
   on. If information is missing, ask clarifying questions in the comment
   instead.
