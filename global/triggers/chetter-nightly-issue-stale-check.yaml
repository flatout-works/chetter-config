# yaml-language-server: $schema=../../../chetter/schemas/trigger.schema.json
# Trigger: nightly issue stale check
#
# Reviews all open GitHub issues and validates they are still relevant
# given ongoing development. Closes stale issues, updates descriptions
# where scope has shifted, and comments where discussion is warranted.
#
# Customize before enabling:
#   GITHUB_REPO - set your repo at the top of the prompt (owner/repo)
#   git_url     - your repository URL
#   git_ref     - branch to work from (usually main)
#   agent_image - runner image (get from your Chetter admin or build your own)
#   timeout_sec - adjust based on number of open issues
#
# To create: chetter_create_trigger with these fields.
# To change later: chetter_update_trigger with changed fields.

name: chetter-nightly-issue-stale-check
enabled: true
cron_expr: "0 6 * * *"
git_url: https://github.com/flatout-works/chetter
git_ref: main
agent_image: chetter-runner:latest
harness: opencode
agent: issue-stale-check
provider_id: opencode
model_id: deepseek-v4-flash-free
timeout_sec: 3600
skills:
  - chetter
prompt: |-
  Review all open issues in flatout-works/chetter and validate they are still relevant.

  GITHUB_REPO=flatout-works/chetter

  Follow the issue-stale-check agent procedure, substituting $GITHUB_REPO into all
  `--repo <owner/repo>` arguments. Do not create any branches, commits, or PRs.

  ## Step 1: List All Open Issues
  ```bash
  gh issue list --repo $GITHUB_REPO --state open --json number,title,labels,updatedAt --limit 100
  ```

  ## Step 2: Categorize and Process Each Issue
  For each open issue:

  1. Read the issue body and comments with `gh issue view <number> --repo $GITHUB_REPO`.
  2. Assess relevance:
     - Is the feature/bug still relevant given the current state of the codebase?
     - Has the approach changed since the issue was filed?
     - Has the issue been implicitly resolved by other work?
  3. Take one of:
     - **Close** if clearly obsolete, already done, or superseded. Call `chetter_issue_comment` to post the explanation, then `gh issue close <number> --repo $GITHUB_REPO`.
     - **Edit description** if the scope shifted enough that the description should be updated. Use `gh issue edit <number> --repo $GITHUB_REPO --body "..."` and add a comment via `chetter_issue_comment` noting what changed.
     - **Comment** if the scope shifted but you are not confident to edit directly. Call `chetter_issue_comment` with the update.
     - **Skip** if still fully relevant.

  ## Step 3: Report Summary
  Print a summary table of actions taken:
  ```
  Closed:   #34 (obsolete approach)
  Edited:   #58 (scope shifted)
  Commented: #42 (scope concern)
  Skipped:  #36, #40, #50 (still relevant)
  ```

  Do not merge, push, commit, or create any PRs. Do not modify any files in the repository.
