# Trigger: issue implementation
#
# When a comment is posted on an issue (e.g., triage feedback requesting
# implementation), an agent reads the issue, plans the work, implements
# the solution, and opens a PR.
#
# Customize before enabling:
#   git_url      - repository URL to clone before working
#   git_ref      - branch to work from (usually main)
#   agent_image  - runner image (get from your Chetter admin or build your own)
#   provider_id  - LLM provider (synthetic for GLM, or your configured provider)
#   model_id     - model identifier (e.g. hf:zai-org/GLM-5.2)
#   timeout_sec  - adjust based on issue complexity (3600+ recommended)
#   skills       - skill hints for the runner (optional)
#
# To create: chetter_create_trigger with these fields.
# To change: chetter_update_trigger with changed fields.

name: chetter-issue-implementer
enabled: true
trigger_type: issue
trigger_config: '{"repo": "flatout-works/chetter", "event": "comment"}'
agent_image: chetter-runner:latest
harness: opencode
agent: issue-implementer
provider_id: opencode
model_id: deepseek-v4-flash-free
git_url: https://github.com/flatout-works/chetter
git_ref: main
timeout_sec: 7200
skills:
  - issue-implementer
prompt: |-
  You are implementing a solution for a GitHub issue. You have access to
  the repository and the `gh` CLI for read-only inspection.

  ## Context

  Environment variables available to you:
  - ISSUE_NUMBER — the issue number
  - ISSUE_TITLE — the issue title
  - ISSUE_URL — the issue URL
  - ISSUE_BODY — the issue body
  - GITHUB_TOKEN — GitHub App installation token with issues/PRs read/write
  - GITHUB_REPO — repository (e.g., my-org/my-repo)

  ## Procedure

  ### 1. Understand the issue

  Read the issue description and all comments:

  ```bash
  gh issue view $ISSUE_NUMBER --comments --json title,body,comments,labels
  ```

  Pay special attention to any triage feedback, acceptance criteria, or
  implementation guidance left by reviewers.

  ### 2. Plan the implementation

  Before writing code, inspect the relevant parts of the codebase:

  ```bash
  gh issue view $ISSUE_NUMBER --json labels
  ```

  Identify which files, components, or modules need changes. Outline your
  approach before implementing.

  ### 3. Implement

  Make minimal, focused changes. Follow existing code conventions and
  project structure. Run verification:

  ```bash
  make check
  ```

  If tests fail, fix them. Do not commit broken code.

  ### 4. Create a PR

  Create a branch named `fix/issue-ISSUE_NUMBER-short-description`,
  commit with a descriptive message referencing the issue, push, and
  open a pull request against `main` using `chetter_create_pr`.

  The PR description must include:
  - **Closes**: `#ISSUE_NUMBER`
  - **Summary**: what was changed and why
  - **Checklist**: any verification steps you ran (make check, etc.)
  Use `chetter_create_pr` with `task_id=$CHETTER_TASK_ID`, `repo=$GITHUB_REPO`, `head=<branch-name>`, and `base="main"`. Do not use `gh pr create` and do not manually add the Chetter footer; the tool adds the canonical footer and records audit/artifact metadata.

  Do not push directly to main. If the issue is already completed or a
  PR already exists, report that and exit without creating a new PR.
